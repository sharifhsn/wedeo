name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - run: sudo apt-get install -y nasm libasound2-dev
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-02-25
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Format check
        run: cargo fmt --all --check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - run: sudo apt-get install -y nasm libasound2-dev
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-02-25
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - name: Unit & integration tests
        run: cargo nextest run --profile ci
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/nextest/ci/junit.xml

  fate-regression:
    name: FATE Regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - run: sudo apt-get install -y nasm libasound2-dev ffmpeg
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-02-25
      - uses: Swatinem/rust-cache@v2

      - name: Cache FATE H.264 samples
        uses: actions/cache@v4
        id: fate-cache
        with:
          path: fate-suite/h264-conformance
          key: fate-h264-conformance-v1

      - name: Fetch FATE H.264 samples
        if: steps.fate-cache.outputs.cache-hit != 'true'
        timeout-minutes: 10
        run: |
          mkdir -p fate-suite
          rsync -a rsync://fate-suite.ffmpeg.org/fate-suite/h264-conformance fate-suite/

      - name: Build wedeo-framecrc
        run: cargo build --release --bin wedeo-framecrc -p wedeo-fate

      # Regression check: compare against committed baselines.
      # Exits 0 if no previously-passing test regressed.
      # New failures on tests not in the baseline are allowed.
      - name: Check for regressions
        id: regression
        run: |
          set -o pipefail
          python3 scripts/suite_runner.py \
            --suite fate-cavlc,fate-cabac \
            --check-snapshot \
            --snapshot-dir test_suites/baselines \
            2>&1 | tee /tmp/fate-results.txt

      - name: Post summary
        if: always()
        run: |
          echo '## FATE Regression Check' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          if [ -f /tmp/fate-results.txt ]; then
            cat /tmp/fate-results.txt >> "$GITHUB_STEP_SUMMARY"
          else
            echo 'No results (build or download may have failed)' >> "$GITHUB_STEP_SUMMARY"
          fi
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  deny:
    name: Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  jvt-regression:
    name: JVT Regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - run: sudo apt-get install -y nasm libasound2-dev
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-02-25
      - uses: Swatinem/rust-cache@v2

      - name: Cache JVT vectors
        uses: actions/cache@v4
        with:
          path: jvt-vectors
          key: jvt-vectors-${{ hashFiles('test_suites/h264/*.json') }}

      - name: Build wedeo-framecrc
        run: cargo build --release --bin wedeo-framecrc -p wedeo-fate

      - name: Download JVT vectors
        continue-on-error: true
        timeout-minutes: 10
        run: python3 scripts/fetch_jvt.py --jobs 8

      # Regression check: compare against committed baselines.
      - name: Check for regressions
        id: regression
        run: |
          set -o pipefail
          python3 scripts/suite_runner.py \
            --suite jvt-avc-v1,jvt-fr-ext \
            --format yuv420p \
            --check-snapshot \
            --snapshot-dir test_suites/baselines \
            2>&1 | tee /tmp/jvt-results.txt

      - name: Post summary
        if: always()
        run: |
          echo '## JVT Regression Check' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          if [ -f /tmp/jvt-results.txt ]; then
            cat /tmp/jvt-results.txt >> "$GITHUB_STEP_SUMMARY"
          else
            echo 'No results (build or download may have failed)' >> "$GITHUB_STEP_SUMMARY"
          fi
          echo '```' >> "$GITHUB_STEP_SUMMARY"
